x-v2board-env: &v2board-env
  docker: "true"
  APP_NAME: "V2Board"
  APP_ENV: "production"
  APP_DEBUG: "false"
  APP_URL: "https://example.com"
  APP_KEY: "base64:please-generate-and-replace-this-key"
  LOG_CHANNEL: "stderr"
  APP_HTTP_HOST: "0.0.0.0"
  APP_HTTP_PORT: "7002"
  V2BOARD_PERSIST_PATH: "/data"
  V2BOARD_FRONTEND_THEME: "default"
  V2BOARD_SECURE_PATH: ""
  V2BOARD_SUBSCRIBE_PATH: ""
  V2BOARD_SERVER_API_URL: ""
  V2BOARD_SERVER_TOKEN: ""
  SCHEDULE_INTERVAL: "60"
  DB_CONNECTION: "mysql"
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_DATABASE: "v2board"
  DB_USERNAME: "root"
  DB_PASSWORD: "change-me"
  CACHE_DRIVER: "redis"
  QUEUE_CONNECTION: "redis"
  SESSION_DRIVER: "redis"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ""

x-v2board-service: &v2board-service
  image: ghcr.io/smile-qwq/v2board:master
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  working_dir: /www
  environment: *v2board-env
  volumes:
    - ./data:/data

services:
  app:
    <<: *v2board-service
    command: ["sh", ".docker/bin/run-app.sh"]
    ports:
      - "7002:7002"

  queue:
    <<: *v2board-service
    command: ["sh", ".docker/bin/run-queue.sh"]

  scheduler:
    <<: *v2board-service
    command: ["sh", ".docker/bin/run-scheduler.sh"]
